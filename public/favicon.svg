<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .fg { fill: #2B2B2B; }
    .ar { stroke: #8B2323; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 1.5; }
    @media (prefers-color-scheme: dark) {
      .fg { fill: #F4EFE6; }
      .ar { stroke: #c94444; }
    }
  </style>
  <!-- J: light weight -->
  <text x="1" y="22" class="fg"
        font-family="ui-sans-serif,system-ui,sans-serif"
        font-size="15"
        font-weight="300">J</text>
  <!-- → arrow -->
  <path d="M9,14 L19,14 M15.5,11 L19.5,14 L15.5,17" class="ar"/>
  <!-- S: bold weight -->
  <text x="21" y="22" class="fg"
        font-family="ui-sans-serif,system-ui,sans-serif"
        font-size="15"
        font-weight="700">S</text>
</svg>
